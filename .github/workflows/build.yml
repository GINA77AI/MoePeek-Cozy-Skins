name: Build MoePeek Cozy Skins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tuist
        run: curl -Ls https://install.tuist.io | bash

      - name: Generate Project
        working-directory: moepeek-src
        run: tuist generate

      - name: Build App (Release)
        working-directory: moepeek-src
        run: xcodebuild -workspace MoePeek.xcworkspace -scheme MoePeek -configuration Release -derivedDataPath build CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Package .app
        run: |
          cd moepeek-src/build/Build/Products/Release
          zip -r -q ../../../MoePeek-Cozy-Skins.zip MoePeek.app
          echo "✅ Packaged: $(du -h ../../../MoePeek-Cozy-Skins.zip | cut -f1)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MoePeek-Cozy-Skins
          path: moepeek-src/MoePeek-Cozy-Skins.zip
          retention-days: 30

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: moepeek-src/MoePeek-Cozy-Skins.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build MoePeek Cozy Skins

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tuist via Homebrew
        run: brew install tuist

      - name: Install Deps & Generate
        working-directory: moepeek-src
        run: |
          export PATH="$HOME/.tuistenv/bin:$PATH"
          tuist install && tuist generate

      - name: Build
        working-directory: moepeek-src
        run: |
          set -e  # Fail immediately if build fails
          export PATH="$HOME/.tuistenv/bin:$PATH"
          set +e
          xcodebuild \
            -workspace MoePeek.xcworkspace \
            -scheme MoePeek \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty; BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          if [ $BUILD_EXIT -ne 0 ]; then echo "❌ BUILD FAILED (exit $BUILD_EXIT)"; exit 1; fi
          # Verify the binary exists
          APP="build/Build/Products/Release/MoePeek.app/Contents/MacOS/MoePeek"
          if [ ! -f "$APP" ] || [ ! -x "$APP" ]; then
            echo "❌ Build output missing or not executable: $APP"
            exit 1
          fi
          echo "✅ Build succeeded"

      - name: Package & Upload
        run: |
          # Find the built app
          APP=$(find moepeek-src/build -name "MoePeek.app" -type d | head -1)
          echo "Found: $APP"
          if [ -z "$APP" ]; then
            echo "::error::MoePeek.app not found"
            exit 1
          fi
          # Verify it has executable
          ls -lh "$APP/Contents/MacOS/" || echo "WARNING: No MacOS dir"
          du -sh "$APP"
          # Create zip using cd + zip to capture everything including binaries
          cd "$(dirname "$APP")"
          zip -r "${GITHUB_WORKSPACE}/MoePeek-Cozy-Skins.zip" "$(basename "$APP")"
          ls -lh "${GITHUB_WORKSPACE}/MoePeek-Cozy-Skins.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: MoePeek-Cozy-Skins
          path: MoePeek-Cozy-Skins.zip
          retention-days: 90

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MoePeek-Cozy-Skins.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
